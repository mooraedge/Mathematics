<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
  
    
    

    <div class="background-score"></div>

        <div class="score-notification">
           
        </div>

    <div class="container">
    
        <div class="first-container">

        <div class="nav">
            <div class="notification">
            </div>
            <div class="notification-letter">Notification: Please enter a right number</div>
            
            <div class="left-nav">

            <img src="image/profile.jpg" alt="profilePicture">   

            <span>CKC</span> 

            </div>

            <div class="time-lapse">00:00:00</div>

            <div class="right-nav">

                <div class="right-nav-left">&#9989; |</div>
                <div class="right-nav-center">&#9776; |</div>
                <div class="right-nav-right">&#9881;</div>

            </div>

        </div>
        <div class="first-container-center">

        <div class="first-value">
           <img class="first-number" src="image/numbers/0.jpg" alt="numberjpg">
        </div>

        <div class="operation">
            +
        </div>

        <div class="second-value">
           <img class="second-number" src="image/numbers/0.jpg" alt="numberjpg">
        </div>

        </div>
            <div class="outerfooter">
        <div class="footer">
            
            <input type="number" class="enter-value" placeholder="What's your answer">
            <button class="answer-submit">Submit</button>
            <button class="start-test">Start</button><br>
            <p class="correct-score"></p>
            <p class="incorrect-score"></p>
            <p class="total-score"></p>
        </div>
            <div class="second-footer">
                <div class="levelupbar">
                    <span class="levelUpBar"></span>
                </div>
                
            </div>
        </div>
        </div>

        <div class="second-container">
            
            <div class="nav-image">
                <div class="right-nav-image">
                    <img class="navy-rank-logo" src="image/logo/navyranklogo.png" alt="navyrank">
                </div>

                <div class="center-nav-image">ONE PIECE</div>
                <div class="left-nav-image">RANK</div>
            </div>

            <div class="rankImage">
                <img style="height: 300px; width:100%; border-radius: 15px; object-fit: cover;" class="theImage"  alt="NO IMAGE" src="image/rankpic/enter.jpg" >;
    
            </div>

            <div class="foot-image">
                <div class="foot-title">
                    <strong><span class="foot-title-ranks">* NO RANKS YET *</span></strong>
                </div>

                <div class="foot-storyline">
                    <p class="story-line">No Story yet....</p>
                </div>

                <div class="foot-end">The End . . .</div>

            </div>
        </div>

    </div>

    <script type="module" src="script/script.js"></script>
</body>
</html>
